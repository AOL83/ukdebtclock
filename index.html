<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>UK Economic Instrument Panel</title>
<style>
body{margin:0;background:#000;color:#00ff66;font-family:Consolas,monospace}
.header{text-align:center;padding:10px;border-bottom:1px solid #0f0}
.hero{padding:10px;text-align:center}
.hero .num{font-size:min(8vw,72px);font-weight:bold}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:6px;padding:6px}
.card{border:1px solid #0f0;background:#050505;padding:8px}
.t{color:#fff;font-size:12px}
.v{font-size:28px;font-weight:bold}
.red{color:#ff5555}.amber{color:#ffb300}.white{color:#fff}
.fuel{height:24px;background:#111;border:1px solid #333}
.bar{height:100%;background:#00ff66}
.small{font-size:12px}
</style>
</head>
<body>
<div class="header"><h1>UK ECONOMIC INSTRUMENT PANEL™</h1></div>
<div class="hero">
<div class="white">UK NATIONAL DEBT</div>
<div id="debt" class="num"></div>
<div id="rate" class="red"></div>
</div>

<div class="grid" id="metrics"></div>

<script>
const s={
debt:3104672883219,debtps:5842,pop:68000000,tax:33000000,
interest:328447192,salary:37000,rent:1350,deposit:48000,
fuel:41,lost:18740
};

const metrics=[
["Debt Per Citizen",()=>fmt(s.debt/s.pop)],
["Debt Per Taxpayer",()=>fmt(s.debt/s.tax)],
["Debt Interest Today",()=>fmt(s.interest)],
["£100 In 2000",()=>"£52"],
["House Deposit",()=>fmt(s.deposit)],
["Years To Save",()=>(s.deposit/(s.salary*.1)).toFixed(1)],
["Rent Burden",()=>((s.rent*12/s.salary)*100).toFixed(0)+"%"],
["Energy Bill","£1,720"],
["Weekly Shop","+£38"],
["First Home Age","34"],
["Mortgage","£248,000"],
["Tax Freedom Days","174"],
["House Prices Since 2000","+312%"],
["Gold Since 2000","+640%"],
["Money Supply Since 2000","+390%"],
["Savings Purchasing Power","-48%"],
["Food Inflation","+31%"],
["Real Wage Growth","-6%"],
["Pension Gap","£142,000"],
["Value Lost Since 2020",()=>fmt(s.lost)],
["Main Leak","Housing"],
["Fuel Tank",()=>s.fuel+"%"],
["Inflation","3.2%"],
["Base Rate","4.75%"],
["Population","68M"],
["Taxpayers","33M"],
["GDP Per Capita","£37k"],
["Home Ownership","63%"],
["Renters","10.6M"],
["Energy Leak","£2,700"],
["Food Leak","£3,900"],
["Tax Leak","£2,400"],
["Housing Leak","£8,200"],
["Other Leak","£1,540"],
["FTSE","8,200"],
["Gold","£2,400/oz"],
["GBP/USD","1.28"],
["National Insurance","8%"],
["State Pension","£11,500"],
["Council Tax Avg","£2,171"]
];

function fmt(n){return "£"+Math.round(n).toLocaleString()}

function render(){
document.getElementById('debt').textContent=fmt(s.debt);
document.getElementById('rate').textContent='+'+s.debtps.toLocaleString()+'/sec';
const g=document.getElementById('metrics');
g.innerHTML='';
metrics.forEach(m=>{
 const v=typeof m[1]==='function'?m[1]():m[1];
 const d=document.createElement('div');
 d.className='card';
 d.innerHTML='<div class=t>'+m[0]+'</div><div class=v>'+v+'</div>';
 g.appendChild(d);
});
const fuel=document.createElement('div');
fuel.className='card';
fuel.innerHTML='<div class=t>Financial SatNav</div><div class=fuel><div class=bar style="width:'+s.fuel+'%"></div></div><div class=v>'+s.fuel+'%</div><div class=small>Value Lost: '+fmt(s.lost)+'</div>';
g.appendChild(fuel);
}

setInterval(()=>{
 s.debt+=s.debtps;
 s.interest+=13;
 render();
},1000);

render();
</script>
</body>
</html>
